rules:
  # 规则说明: Go 惯例中 ID 类缩写必须全大写（UserID 而非 UserId），避免不符合 golint 规范
  - id: QUAL-001
    name: ID 缩写必须全大写
    severity: P1
    pattern:
      type: regex
      match: '\b(UserId|ProductId|OrderId|RoleId|AccountId|GroupId|ItemId|TaskId|MessageId|SessionId|TokenId|AppId|TenantId|MemberId|CustomerId|EmployeeId|DepartmentId|CategoryId|TagId|FileId)\b'
    message: "Go 规范要求首字母缩写词必须全大写或全小写。ID 应写为 UserID、ProductID、OrderID 等，而非 UserId、ProductId、OrderId。违反此规范会导致 golint 报错。"
    examples:
      bad: 'type UserInfo struct { UserId int64; OrderId string }'
      good: 'type UserInfo struct { UserID int64; OrderID string }'

  # 规则说明: iota 生成的枚举值不直观，重构时容易因插入/删除枚举项导致数值偏移，引发数据不一致
  - id: QUAL-002
    name: 禁用 iota 定义枚举常量
    severity: P1
    pattern:
      type: regex
      match: '\biota\b'
    message: "禁止使用 iota 定义业务枚举常量。iota 的值依赖声明顺序，插入或删除枚举项会导致后续数值偏移，破坏数据库中已存储的枚举值映射。应为每个常量显式赋值（如 StatusActive = 1）。"
    examples:
      bad: "const ( StatusUnknown = iota; StatusActive; StatusInactive )"
      good: "const ( StatusUnknown = 0; StatusActive = 1; StatusInactive = 2 )"

  # 规则说明: 全局变量（尤其是可变全局变量）会引入隐式状态，使代码难以测试和并发安全
  # NOTE: 此规则误报率较高，agent 需二次确认——预编译正则（var xxxRe = regexp.MustCompile）和测试文件中的全局变量可豁免
  - id: QUAL-003
    name: 禁用可变全局变量
    severity: P1
    pattern:
      type: regex
      match: '^var [a-zA-Z][a-zA-Z0-9]* [^=]*='
    message: "禁止声明可变的包级全局变量（var）。全局变量引入隐式共享状态，导致代码难以测试（无法注入 mock）和并发不安全。应通过依赖注入传递依赖。豁免情况：regexp.MustCompile 预编译正则、sync.Once 初始化的单例。"
    examples:
      bad: "var defaultTimeout = 30 * time.Second"
      good: "// 通过配置或依赖注入传递\nfunc NewService(timeout time.Duration) *Service { ... }"

  # 规则说明: init 函数执行顺序不可控，难以测试，隐藏副作用，应显式初始化
  - id: QUAL-004
    name: 禁用 init 函数
    severity: P1
    pattern:
      type: regex
      match: '^func init\(\)'
    message: "禁止使用 init() 函数进行初始化。init() 执行时机隐式，执行顺序依赖文件/包加载顺序，难以测试和调试。应使用显式初始化函数（如 NewXxx() 或 InitXxx()），由调用方在 main() 中显式调用。"
    examples:
      bad: "func init() { db = connectDatabase() }"
      good: "func InitDB(cfg *Config) (*gorm.DB, error) { return connectDatabase(cfg) }"

  # 规则说明: switch 语句必须包含 default 分支，处理未预期的枚举值，避免静默忽略
  # NOTE: 此规则误报率较高，正则仅检测 switch 关键字，agent 需检查对应 switch 块是否有 default 分支
  - id: QUAL-005
    name: switch 必须包含 default 分支
    severity: P1
    pattern:
      type: regex
      match: '\bswitch\b.*\{'
    message: "switch 语句必须包含 default 分支。缺少 default 会静默忽略未预期的枚举值，导致程序行为不可预期。default 分支至少应记录警告日志或返回错误。注意：此规则需结合 switch 块完整内容判断。"
    examples:
      bad: "switch status { case 1: doA(); case 2: doB() }"
      good: "switch status { case 1: doA(); case 2: doB(); default: log.Warn(ctx, \"unknown status\", log.Int(\"status\", status)) }"

  # 规则说明: TODO/NOTE 注释必须标注负责人，否则无法追踪是否已处理
  - id: QUAL-006
    name: TODO/NOTE 注释必须标注 owner
    severity: P1
    pattern:
      type: regex
      match: '// (TODO|NOTE|FIXME|HACK)[^(]'
    message: "TODO/NOTE/FIXME/HACK 注释必须标注负责人和时间，格式为 // TODO(username): 描述 或 // TODO(username, 2024-01-01): 描述。无 owner 的 TODO 永远不会被处理。"
    examples:
      bad: '// TODO: fix this later'
      good: '// TODO(zhangsan): fix null pointer issue when user not found'

  # 规则说明: make 初始化 slice/map 时应预估容量，避免动态扩容导致的频繁内存分配
  # NOTE: 此规则误报率中等，make([]Type) 无法区分是否确实需要容量预估，agent 需根据上下文判断
  - id: QUAL-007
    name: make 初始化应指定容量
    severity: P2
    pattern:
      type: regex
      match: 'make\(\[\][a-zA-Z*][a-zA-Z0-9.*]*\)'
    message: "使用 make() 初始化切片时建议指定预估容量（如 make([]T, 0, len(input))），避免因动态扩容产生频繁内存分配和数据拷贝。如果无法预估容量，至少应说明原因。make(map[K]V) 同理。"
    examples:
      bad: 'result := make([]UserInfo)'
      good: 'result := make([]UserInfo, 0, len(users))'

  # 规则说明: 公开导出函数（大写开头）必须有 godoc 注释，便于 IDE 提示和文档生成
  # NOTE: 此规则误报率较高，仅检测大写函数定义，agent 需检查前一行是否有注释
  - id: QUAL-008
    name: 公开函数必须有注释
    severity: P1
    pattern:
      type: regex
      match: '^func [A-Z][a-zA-Z0-9]*\('
    message: "所有导出函数（大写开头）必须有 godoc 注释，注释以函数名开头（如 // GetUser returns...）。注释应说明函数用途、参数含义和返回值说明。注意：此规则需检查函数定义的前一行是否有 // 注释。"
    examples:
      bad: "func GetUser(ctx context.Context, id int64) (*User, error) {"
      good: "// GetUser retrieves a user by ID. Returns ErrNotFound if the user does not exist.\nfunc GetUser(ctx context.Context, id int64) (*User, error) {"

  # 规则说明: 枚举常量应有中文注释说明业务含义，便于维护者理解数值含义
  - id: QUAL-009
    name: 枚举常量应有中文业务注释
    severity: P2
    pattern:
      type: regex
      match: '[[:space:]][A-Za-z][a-zA-Z0-9]* +[A-Za-z][a-zA-Z0-9]* += +[0-9]$'
    message: "枚举常量应在行尾或上方添加中文注释，说明该枚举值的业务含义（如 StatusActive = 1 // 激活状态）。纯数字枚举值缺少注释会让维护者难以理解其业务语义。"
    examples:
      bad: 'StatusActive = 1'
      good: 'StatusActive = 1 // 激活状态：用户账号正常可用'

  # 规则说明: 包名应与目录名一致，此规则在静态正则层面难以精确检测，作为占位规则由 agent 处理
  # NOTE: 此规则的精确检测需要跨文件上下文（目录名 vs 包名对比），scan-rules.sh 难以实现，
  #       agent 在代码审查时应人工检查包名与目录名是否一致
  - id: QUAL-010
    name: 包名与目录名必须一致
    severity: P2
    pattern:
      type: regex
      match: '^package [a-z][a-z0-9]*$'
    message: "Go 包名必须与所在目录名保持一致（下划线替换为空，复数形式保持）。包名与目录名不一致会导致导入路径混乱，违反 Go 工具链惯例。注意：此规则需对比包声明与实际目录名，仅靠正则无法完整检测，agent 需人工核查。"
    examples:
      bad: "// 目录名为 user_service，但包名为\npackage userSvc"
      good: "// 目录名为 userservice，包名应为\npackage userservice"
